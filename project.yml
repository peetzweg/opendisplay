name: OpenSidecar
options:
  createIntermediateGroups: true
# Swift Package Manager dependencies. Sparkle powers the macOS app's
# out-of-store auto-update (issue #52); it's an embedded open-source
# framework + CLI tooling, not a hosted service — the appcast feed and the
# DMG are served from infrastructure we already own (GitHub Pages + Releases).
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    # 2.x is the current major (latest 2.9.x) and the first Sparkle line to
    # support SPM. `from:` allows compatible 2.x updates.
    from: "2.6.0"
schemes:
  OpenSidecarMac:
    build:
      targets:
        OpenSidecarMac: all
  OpenSidecariOS:
    build:
      targets:
        OpenSidecariOS: all
  OpenSidecariOSLegacy:
    build:
      targets:
        OpenSidecariOSLegacy: all
# DEVELOPMENT_TEAM comes from the environment (see generate.sh / .env) so no
# personal team ID lives in the repo. Unset = unsigned, fine for CI.
settings:
  base:
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    # Version defaults for local builds. CI overrides both via xcargs:
    # MARKETING_VERSION from the release tag, CURRENT_PROJECT_VERSION from
    # the GitHub Actions run number (monotonic, keeps TestFlight builds unique).
    MARKETING_VERSION: "0.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  OpenSidecarMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Mac
    dependencies:
      - package: Sparkle
    info:
      path: Mac/Info.plist
      properties:
        NSPrincipalClass: NSApplication
        CFBundleDisplayName: $(BUNDLE_DISPLAY_NAME)
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        NSLocalNetworkUsageDescription: OpenDisplay connects to your iPad or iPhone over the local network in WiFi mode.
        NSBonjourServices: ["_opensidecar._tcp"]
        LSApplicationCategoryType: public.app-category.utilities
        # --- Sparkle auto-update (issue #52) ---
        # The appcast feed is hosted on the landing-page site at the custom
        # domain. The release workflow publishes appcast.xml so this URL
        # resolves — see .github/workflows/release.yml.
        SUFeedURL: https://opendisplay.app/appcast.xml
        # Public EdDSA key from Sparkle's `generate_keys`. The matching private
        # key lives only as the `SPARKLE_PRIVATE_KEY` GitHub Actions secret
        # (used to sign the appcast in CI) and is never committed. Sparkle
        # verifies update signatures against this public key before installing.
        SUPublicEDKey: rYxlIePmwzi2bRo/qIsuY2TqTnQ34li2gQhJpGBiumw=
        # Check for updates automatically in the background on a schedule.
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peetzweg.opensidecar.mac
        PRODUCT_NAME: OpenDisplay
        BUNDLE_DISPLAY_NAME: OpenDisplay
        SWIFT_OBJC_BRIDGING_HEADER: Mac/OpenSidecarMac-Bridging-Header.h
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Mac/OpenSidecarMac.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Local dev builds get their own identity: TCC keys permission
        # grants by bundle ID + code signature, so a Debug build sharing
        # the release bundle ID knocks out the release app's Screen
        # Recording/Accessibility grants every time the binary changes.
        # The distinct display name keeps the two telling apart in the
        # System Settings permission lists.
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.peetzweg.opensidecar.mac.debug
          BUNDLE_DISPLAY_NAME: OpenDisplay Dev
  OpenSidecariOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - iOS
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: OpenDisplay
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        NSLocalNetworkUsageDescription: OpenDisplay advertises itself on the local network so your Mac can connect over WiFi.
        NSBonjourServices: ["_opensidecar._tcp"]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peetzweg.opensidecar.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  OpenSidecariOSLegacy:
    type: application
    platform: iOS
    deploymentTarget: "12.0"
    sources:
      - iOS-Legacy
    info:
      path: iOS-Legacy/Info.plist
      properties:
        CFBundleDisplayName: OpenDisplay Legacy
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIViewControllerBasedStatusBarAppearance: true
        UIRequiresFullScreen: true
        NSLocalNetworkUsageDescription: OpenDisplay advertises itself on the local network so your Mac can connect over WiFi.
        NSBonjourServices: ["_opensidecar._tcp"]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peetzweg.opensidecar.ios.legacy
        PRODUCT_NAME: OpenDisplayLegacy
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
