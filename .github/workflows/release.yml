name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Serialize release runs on the same ref so two quick merges can't race two
# uploads. Never cancel an in-flight run — it may be mid-upload to TestFlight.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          release-type: simple

  build-ios:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: xcodegen generate

      - name: Set up SSH for match certs repo
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      - name: Build iOS app and upload to TestFlight
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          APP_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          export APP_MARKETING_VERSION="${TAG_NAME#v}"
          bundle exec fastlane ios beta

  build-mac:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: xcodegen generate

      - name: Set up SSH for match certs repo
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      - name: Build notarized macOS app
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          APP_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          export APP_MARKETING_VERSION="${TAG_NAME#v}"
          bundle exec fastlane mac build_release

      - name: Upload macOS artifact to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            build/export/OpenSidecar.dmg
